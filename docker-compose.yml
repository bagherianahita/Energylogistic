services:
  postgres:
    image: postgres:16-alpine
    container_name: energy-logix-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: energy_logix
      POSTGRES_PASSWORD: energy_logix_dev
      POSTGRES_DB: energy_logix
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U energy_logix -d energy_logix"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
